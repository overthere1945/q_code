// @file sns_timer.proto
//
// @brief Defines message types for the Timer Sensor.
//
// @copyright
// Copyright (c) Qualcomm Technologies, Inc. and/or its subsidiaries.\n
// All Rights Reserved.\n
// Confidential and Proprietary - Qualcomm Technologies, Inc.\n
//
// @details Generates timer event after the specified timeout.
//
// ## Attribute Requirements:
// 1. SNS_STD_SENSOR_ATTRID_TYPE as "timer"
// 2. SNS_STD_SENSOR_ATTRID_API attribute contains "sns_timer.proto"
//
// ## Processing Stream Requests:
// 1. SNS_TIMER_MSGID_SNS_TIMER_SENSOR_CONFIG: This message is used to start, 
//    reconfigure or stop the timer sensor.
// 
// ## Publishing Stream Events:
// 1. SNS_TIMER_MSGID_SNS_TIMER_SENSOR_EVENT: This event is generated when a 
//    timer's timeout occurs.
// 2. SNS_TIMER_MSGID_SNS_TIMER_SENSOR_REG_EVENT: This message is used to 
//    acknowledge that a timer was successfully registered. This event contains
//    the sns_timer_reg_event with the options selected by the timer sensor. 
//    The event will be re-sent each time the timer sensor automatically 
//    adjusts the period of a periodic timer.


syntax = "proto2";
import "nanopb.proto";

enum sns_timer_sensor_timeout
{
  option (nanopb_enumopt).long_names = false;

  SNS_TIMER_SENSOR_TIMEOUT_MIN_TIMEOUT_NANOSEC = 100000;
}

// @brief Message IDs for Timer Sensor.
enum sns_timer_msgid {
  option (nanopb_enumopt).long_names = false;

  // @brief Timer config message.
  //
  // Corresponds to the message sns_timer_sensor_config.
  // This message is used to start, reconfigure or stop the timer sensor.
  SNS_TIMER_MSGID_SNS_TIMER_SENSOR_CONFIG = 512;

  // @brief Timer event message.
  //
  // Corresponds to the message sns_timer_sensor_event.
  // This event is generated when a timer's timeout occurs.
  SNS_TIMER_MSGID_SNS_TIMER_SENSOR_EVENT  = 1025;

  // @brief Timer registration message.
  SNS_TIMER_MSGID_SNS_TIMER_SENSOR_REG_EVENT = 1026;
}

// @brief Priority of timer events
enum sns_timer_priority {
  option (nanopb_enumopt).long_names = false;
  // @brief Priority LOWEST is used for low priority timers
  SNS_TIMER_PRIORITY_LOWEST  = 0;
  // @brief Priority OTHER is used for general timer events, and should be used
  // by default
  SNS_TIMER_PRIORITY_OTHER   = 10;
  // @brief Priority POLLING is used for polling physical sensors
  SNS_TIMER_PRIORITY_POLLING = 50;
  // @brief Priority S4S is used for S4S schedules
  SNS_TIMER_PRIORITY_S4S     = 100;
}

// @brief Timer configuration message.
// The minimum time resolution supported by the timer is
// min_timeout_nanosec
message sns_timer_sensor_config
{

  // @brief The time of starting the timer in ticks. This is typically current 
  // time.
  required uint64 start_time = 1;

  // @brief The timeout period starting from start_time, in ticks.
  required uint64 timeout_period = 2;

  // @brief If this timer is periodic. If true, the timer will be rearmed to
  // timeout_period when the timer fires. If false, the timer will be disarmed
  // after firing once. The memory associated with this timer will not be
  // released until this connection is terminated.
  required bool is_periodic = 3;

  // @brief The start_config allows the timer sensor to modify the start_time. 
  // This may allow the timer sensor to synchronize with other nearby timers 
  // to save power if the exact value of start_time is flexible.
  // If this message is not present, default values are 0.
  message start_config_message {
    // @brief The start_time may be adjusted to start early by this many ticks.
    required uint32 early_start_delta = 1;
    // @brief The start_time may be adjusted to start late by this many ticks.
    required uint32 late_start_delta = 2;
  }
  optional start_config_message start_config = 4;

  // @brief The timeout_config allows the timer sensor to modify the 
  // timeout_period. This may allow the timer sensor to synchronize with other 
  // timers to save power if the exact periodicity is flexible.
  // If this message is not present, default values are 0.
  message timeout_config_message {
    // @brief The initial timeout_period may be adjusted smaller by this many 
    // ticks.
    required uint32 low_timeout_delta = 1;
    // @brief The initial timeout_period may be adjusted larger by this many 
    // ticks.
    required uint32 high_timeout_delta = 2;

    // @brief jitter_ticks only applies if "is_periodic" is true. After the 
    // first TIMER_SENSOR_EVENT, the timeout_period will only be adjusted by 
    // this many ticks in each period. The accumulated adjustments will stay 
    // within the low/high bounds defined in this message.
    optional uint32 jitter_ticks = 3;
  }
  optional timeout_config_message timeout_config = 5;

  // @brief Set this to true to cause the timer sensor to send a 
  // TIMER_SENSOR_REG_EVENT and include this timer as part of the timers to be 
  // synchronized, but the timer will not actually be started, and no 
  // TIMER_SENSOR_EVENTs will be generated. This is useful to know how to 
  // synchronize to other timers on the system without actually causing timer 
  // events to occur.
  optional bool is_dry_run = 6 [default = false];

  // @brief If multiple timers expire at the same time, timer events with 
  // higher priority will be sent first.
  // default: other
  optional sns_timer_priority priority = 7 [default = SNS_TIMER_PRIORITY_OTHER];
  
  // @brief Set this to true to disable sending a TIMER_SENSOR_REG_EVENT
  // TIMER_SENSOR_REG_EVENT message might be unnecessary if client doesn't want
  // to handle it
  optional bool disable_response = 8 [default = false];
}

// @brief Timer Sensor event
// This event is generated each time the timer fires. The time at which the 
// timer fires can differ from the requested timeout by up to 
// min_timeout_nanosec. The client is responsible for checking the 
// requested_timeout_time and the timeout_time fields and determine if 
// additional delays must be added.
message sns_timer_sensor_event
{
  // @brief The timeout period generated from the timer_sensor_config message 
  // in ticks.
  required uint64 requested_timeout_time = 1;

  // @brief The time at which the timer fired, in ticks.
  required uint64 timeout_time = 2;
}

// @brief Timer registration message
//
// This message is used to acknowledge that a timer was successfully
// registered. This event contains options selected by the timer sensor based
// on the config event. The event will be re-sent each time the timer sensor 
// automatically adjusts the period of a periodic timer.
message sns_timer_sensor_reg_event
{
  required uint64             start_time     = 1;
  required uint64             timeout_period = 2;
  required bool               is_periodic    = 3;
  required bool               is_dry_run     = 4;
  required sns_timer_priority priority       = 5;
}
