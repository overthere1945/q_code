//
// @details Threshold sensor is use to generate output only after threshold is
// met.
// 
// ## Attribute Requirements:
// 1. SNS_STD_SENSOR_ATTRID_TYPE: "threshold"
// 2. SNS_STD_SENSOR_ATTRID_STREAM_TYPE: SNS_STD_SENSOR_STREAM_TYPE_STREAMING
//
// ## Processing Stream Requests:
// 1. SNS_THRESHOLD_MSGID_SNS_THRESHOLD_CONFIG is to enable the sensor.
//    This request is used to either request for a new configuration of the 
//    threshold Sensor or alter an already existing configuration or query the 
//    current configuration. Only requests with SUIDs of Sensors configured 
//    through sns_threshold.xml will be serviced. All other requests will be 
//    rejected with an error event (SNS_STD_ERROR_NOT_SUPPORTED).
//
// ## Publishing Stream Events:
// Threshold uses sns_std_sensor_event for it's output event.
// An event is generated by the threshold algorithm only if the threshold is 
// met on any of the axis for the sensor. Thresholding can be done as value 
// based delta between current value and the last generated output. 
// Or thresholding can be done as the delta between current value and the last 
// output, as a percentage of the last output. Thresholding can also be done 
// based on the current value going beyond a particular absolute threshold 
// value. When thresholding criteria is met , an event is generated by the 
// algorithm. 
//
// All data events are generated as sns_std_sensor_event.
syntax = "proto2";
import "nanopb.proto";
import "sns_std.proto";
import "sns_std_sensor.proto";

enum sns_threshold_msgid
{
  option (nanopb_enumopt).long_names = false;

  SNS_THRESHOLD_MSGID_SNS_THRESHOLD_CONFIG = 512;
}

// @brief Configuration Message
message sns_threshold_config
{
  // @brief UID of the sensor from which data is being requested from.
  required sns_std_suid sensor_uid = 1;

  // @brief The threshold value per data field.
  // The number of threshold values need to be less than or equal to the number 
  // of sensor data fields. For SNS_THRESHOLD_TYPE_ANGLE, a single 
  // threshold_val value representing the angle between current and last 
  // reported quaternions. FLT_MAX if thresholding is not required for 
  // corresponding data field.
  repeated float threshold_val = 2;

  // @brief Tells us how to use the thresholding value provided.
  required  sns_threshold_type  threshold_type = 3;
  
  // @brief The message id to be used to configure the underlying sensor.
  // This is used together with the below payload field. 
  required uint32 payload_cfg_msg_id = 4;
  
  // @brief Dynamic length payload, containing the actual data/configuration 
  // request. 
  // This payload will need to be decoded separately, using the Sensor-specific
  // header file. 
  required bytes payload = 5;
}


