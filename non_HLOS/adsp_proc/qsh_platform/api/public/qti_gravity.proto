// @file qti_gravity.proto
//
// @brief Defines standard message types for the QTI Gravity Proto.
//
// @copyright
// Copyright (c) Qualcomm Technologies, Inc. and/or its subsidiaries.\n
// All Rights Reserved.\n
// Confidential and Proprietary - Qualcomm Technologies, Inc.\n
//
// @details Gravity sensor is use to get the device motion state.
//
// ## Attribute Requirements:
// 1. SNS_STD_SENSOR_ATTRID_TYPE: "gravity"
// 2. SNS_STD_SENSOR_ATTRID_API: "sns_gravity.proto", "qti_gravity.proto"
// 3. SNS_STD_SENSOR_ATTRID_STREAM_TYPE: SNS_STD_SENSOR_STREAM_TYPE_STREAMING
//
// ## Processing Stream Requests:
// 1. Configuration Message.
// Used to either request for a certain configuration of the qti gravity sensor 
// or alter an already existing configuration of the qti gravity sensor Uses 
// sns_std_sensor_config defined in sns_std_sensor.proto
// The message field definitions are as follows:
// 1.float sample_rate
//      containing the required sample rate of the qti gravity sensor in hertz
//
// 
// ## Publishing Stream Events:
// This sensor publish current device motion state.
// 1. QTI_GRAVITY_DEVICE_MOTION_STATE_UNKNOWN:  Device motion state is unknown.
// 2. QTI_GRAVITY_DEVICE_MOTION_STATE_ABS_REST: Device is at absolute rest.
// 3. QTI_GRAVITY_DEVICE_MOTION_STATE_REL_REST: Device is at relative rest.
// 4. QTI_GRAVITY_DEVICE_MOTION_STATE_MOTION:   Device is in motion.

syntax = "proto2";
import "nanopb.proto";
import "sns_std_sensor.proto";

// @brief Gravisty sensor message ID.
enum qti_gravity_msgid
{
  option (nanopb_enumopt).long_names = false;
  QTI_GRAVITY_MSGID_QTI_GRAVITY_MOTION_DATA_EVENT = 1029;
}

// @brief Device Motion State detected by the gravity sensor.
enum qti_gravity_device_motion_state
{
  option (nanopb_enumopt).long_names = false;

  // @brief Device motion state is unknown.
  QTI_GRAVITY_DEVICE_MOTION_STATE_UNKNOWN = 0;

  // @brief Device is at absolute rest, an example of which
  // would be lying undisturbed on a desk.
  QTI_GRAVITY_DEVICE_MOTION_STATE_ABS_REST = 1;

  // @brief Device is at relative rest, an example of which
  // would be held steady in the user hand undergoing
  // no orientation change.
  QTI_GRAVITY_DEVICE_MOTION_STATE_REL_REST = 2;

  // @brief Device is in motion.
  QTI_GRAVITY_DEVICE_MOTION_STATE_MOTION = 3;
}

// @brief Data Message
// Output data event generated by the qti gravity sensor.
message qti_gravity_motion_data_event
{
  // @brief Device motion state detected using the gravity vector.
  required qti_gravity_device_motion_state device_motion_state = 1 [default=QTI_GRAVITY_DEVICE_MOTION_STATE_UNKNOWN];
}
