//
// @details The diag sensor is used to select a data_type for diag logging
// and F3 msgs print on QXDM.
//
// ## Attribute Requirements:
// 1. SNS_STD_SENSOR_ATTRID_TYPE: "diag_sensor"
// 2. SNS_STD_SENSOR_ATTRID_API attribute contains "sns_diag_sensor.proto".
// 3. SNS_STD_SENSOR_ATTRID_STREAM_TYPE: SNS_STD_SENSOR_STREAM_TYPE_ON_CHANGE

syntax = "proto2";
import "nanopb.proto";
import "sns_std_type.proto";
import "sns_client.proto";

// @brief Stream requests and events.
enum sns_diag_sensor_msgid {
  option (nanopb_enumopt).long_names = false;

  SNS_DIAG_SENSOR_MSGID_SNS_DIAG_LOG_TRIGGER_REQ = 520;
  
  // @brief Request msg ID to query active client requests running on
  // client manager.
  SNS_DIAG_SENSOR_MSGID_SNS_DIAG_GET_CM_ACTIVE_CLIENT_REQ = 521;
  
  // @brief A single Event sent to client for the active client requests
  // running on  Client manager.
  SNS_DIAG_SENSOR_MSGID_SNS_DIAG_CM_ACTIVE_CLIENT_REQ_EVENT = 800;
}

// @brief Log packets that can be triggered by the diag sensor.
enum sns_diag_triggered_log_type {
  option (nanopb_enumopt).long_names = false;

  // @brief Triggers generation not initialized.
  SNS_DIAG_TRIGGERED_LOG_TYPE_UNINITIALIZED = 0;

  // @brief Triggers generation of sns_diag_island_transition_log.
  // Only one log is generated per request. ( see sns_diag.proto,
  // sns_diag_island_log message for more details.)
  SNS_DIAG_TRIGGERED_LOG_TYPE_ISLAND_LOG = 1;

  // @brief Triggers generation of sns_diag_mem_utilization_log.
  // A single request will generate a log for each separate memory
  // pool in the system. ( see sns_diag.proto, sns_diag_mem_utilization_log 
  // message for more details.)
  SNS_DIAG_TRIGGERED_LOG_TYPE_MEMORY_USAGE_LOG = 2;
}

// @brief Trigger generation of log packets. Depending upon
// the type of log packet that is being triggered,
// multiple log packets can be triggered for each
// request.
//
// If the log packet that is triggered has been disabled
// no log will be generated.
message sns_diag_log_trigger_req {

  // @brief User defined cookie.
  // Used by test scripts to identify logs triggered
  // by messages sent to the SSC.
  optional fixed64 cookie = 1;

  // @brief The type of log packets that the diag sensor must
  // generate.
  required sns_diag_triggered_log_type log_type = 2;
}

// @brief A single Event generated by Diag sensor listing all the active 
// client request running on Client Manager.
message sns_diag_cm_active_client_req_event {

  message request_msg {
  
    // @brief Timestamp when request was received by Client manager to activate 
    // sensor.
    required fixed64 timestamp = 1;
  
    // @brief Client request.
    required sns_client_request_msg request = 2;
  }
  
  repeated request_msg cm_request = 1;
}


