syntax = "proto2";
import "nanopb.proto";

// @brief Internal Framework message IDs.
// Note: These message IDs must not conflict with those in sns_std_msgid.
enum sns_fw_msgid {
  option (nanopb_enumopt).long_names = false;

  // @brief Special message only sent and processed by the Framework; not processed by
  // Sensors. Empty Message.
  SNS_FW_MSGID_SNS_DESTROY_REQ = 120;

  // @brief Special message only sent by the Framework; not processed by Sensors.
  // Empty Message.
  SNS_FW_MSGID_SNS_DESTROY_COMPLETE_EVENT = 250;
}
