// @file sns_inbag_detect.proto
//
// @brief Defines message types for the In Bag Detector Sensors.
//
// @copyright
// Copyright (c) Qualcomm Technologies, Inc. and/or its subsidiaries.
// All Rights Reserved.
// Confidential and Proprietary - Qualcomm Technologies, Inc.
//
// @details The sensor determines if the device is In a Bag or Not in a Bag.
// Not in a Bag shall include all scenarios when In a Bag is not detected.
//
// ## Attribute Requirements:
// 1. SNS_STD_SENSOR_ATTRID_TYPE: "inbag_detect"
// 2. SNS_STD_SENSOR_ATTRID_STREAM_TYPE: SNS_STD_SENSOR_STREAM_TYPE_ON_CHANGE
// 3. SNS_STD_SENSOR_ATTRID_API attribute contains "sns_inbag_detect.proto"
//
// ## Processing Stream Requests:
// - SNS_STD_SENSOR_MSGID_SNS_STD_ON_CHANGE_CONFIG is used to enable this sensor.
//
// ## Publishing Stream Events:
// - SNS_DEVICE_CONTEXT_MSGID_SNS_DEVICE_CONTEXT_EVENT:
//   - The sns_device_context_event message is used to publish device context.

syntax = "proto2";
import "nanopb.proto";
import "sns_device_context.proto";

enum sns_inbag_detect_msgid
{
  option (nanopb_enumopt).long_names = false;

  // @brief The message ID of the Inbag detect data message
  // note: Refer sns_device_context_data message in the sns_device_context.proto
  // Message: sns_inbag_detect_data
  SNS_INBAG_DETECT_MSGID_SNS_INBAG_DETECT_DATA = 800;
}

// @brief Data message generated by the Inbag detect to convey the output
message sns_inbag_detect_data
{
  // @brief Reserved fields for Qualcomm
  reserved 1 to 16;

  // @brief Sensors may choose to implement their own device context data fields
  // Client shall refer to the correct vendor specific API to decode this message
  // Client shall refer to "SNS_STD_SENSOR_ATTRID_VENDOR" to know the vendor
}

