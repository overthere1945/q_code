syntax = "proto2";
import "nanopb.proto";
import "sns_std_sensor.proto";


// @brief Standard message IDs supported by Device Context Sensors.
// Note that Sensors may support additional message IDs as defined in
// their respective proto files.
enum sns_device_context_msgid
{
  option (nanopb_enumopt).long_names = false;

  // @brief A standard Device Context event with Device Context data.
  // Note: Sensors may choose to implement their own data event message(s).
  // Message: sns_device_context_event
  SNS_DEVICE_CONTEXT_MSGID_SNS_DEVICE_CONTEXT_EVENT = 777;
}

// @brief States generated by Device Context Sensors as their output.
enum sns_device_context_type
{
  option (nanopb_enumopt).long_names = false;

  // @brief Device Context is "Unknown"
  SNS_DEVICE_CONTEXT_UNKNOWN      = 0;

  // @brief Device Context is "Not Detected"
  SNS_DEVICE_CONTEXT_NOT_DETECTED = 1;

  // @brief Device Context is "Detected"
  SNS_DEVICE_CONTEXT_DETECTED     = 2;
}

// @brief Device context data message
// Refer Sensor specific API to encode/decode the message
message sns_device_context_data
{
  // @brief Message ID of the Device context data
  optional fixed32 msg_id = 1;

  // @brief Payload of the Device context data
  optional bytes payload = 2;
}

// @brief Event generated by Device Context Sensors to convey their output.
message sns_device_context_event
{
  // @brief Detected event type ID
  optional sns_device_context_type state = 1;

  // @brief Device context data
  optional sns_device_context_data data = 2;
}
