// @file sns_ccd_walk.proto
//
// @brief Defines message types for the Walk CCD.
//
// @copyright
// Copyright (c) Qualcomm Technologies, Inc. and/or its subsidiaries.\n
// All rights reserved.\n
// Confidential and Proprietary - Qualcomm Technologies, Inc.\n
//
// @details CCD Walk calculates a walk state.
// When a walk is detected, the sensor will send one WALK event.
// To send additional walk events, the sensor must be re-armed with the
// SNS_STD_SENSOR_MSGID_SNS_STD_ON_CHANGE_CONFIG event again.
//
// No events are generated when not in the walk state.
//
// ## Attribute Requirements:
// 1. SNS_STD_SENSOR_ATTRID_TYPE: "ccd_walk"
// 2. SNS_STD_SENSOR_ATTRID_STREAM_TYPE: 
//    SNS_STD_SENSOR_STREAM_TYPE_SINGLE_OUTPUT
// 3. SNS_STD_SENSOR_ATTRID_API: "sns_ccd_walk.proto"
//
// ## Processing Stream Requests:
// - SNS_STD_SENSOR_MSGID_SNS_STD_ON_CHANGE_CONFIG is used to enable the sensor
//
// ## Publishing Stream Events:
// - A NULL message with message ID SNS_CCD_WALK_MSGID_SNS_CCD_WALK_EVENT is 
//   used to publish the walk event.
// - Walk does not publish configuration events.


syntax = "proto2";
import "nanopb.proto";
import "sns_std_sensor.proto";

// @brief Message IDs for Walk Sensor
enum sns_ccd_walk_msgid {
  option (nanopb_enumopt).long_names = false;

  SNS_CCD_WALK_MSGID_SNS_CCD_WALK_EVENT = 773;
}

