// @file sns_color.proto
//
// @brief Defines the API for Color Sensors.
// All Color Sensor drivers are required to comply with this API.
// Any additional functionality for Color Sensor may be defined in a
// device specific API file.
//
// @copyright
// Copyright (c) Qualcomm Technologies, Inc. and/or its subsidiaries.
// All rights reserved.
// Confidential and Proprietary - Qualcomm Technologies, Inc.
//
// @details
// ## Attribute requirements:
// The Color Sensor publishes:
// 1. SNS_STD_SENSOR_ATTRID_TYPE attribute value as "color"
// 2. SNS_STD_SENSOR_ATTRID_API attribute contains "sns_color.proto"
// 3. SNS_STD_SENSOR_ATTRID_RESOLUTIONS attribute values in Lux/LSB unit
// 4. SNS_STD_SENSOR_ATTRID_RANGES attribute values in Lux unit
// 5. SNS_STD_SENSOR_ATTRID_STREAM_TYPE as SNS_STD_SENSOR_STREAM_TYPE_STREAMING
//    or SNS_STD_SENSOR_STREAM_TYPE_ON_CHANGE
// 6. See sns_std_sensor.proto for other attributes
//
// ## Processing stream requests:
// 1. A Color Sensor may support either streaming or on-change
//    modes. The operating mode is configured in the sensors Registry.
//  a. If a driver supports both modes, it must publish two sensors. One
//     with SNS_STD_SENSOR_ATTRID_STREAM_TYPE == 
//     SNS_STD_SENSOR_STREAM_TYPE_STREAMING,
//     and a second with SNS_STD_SENSOR_STREAM_TYPE_ON_CHANGE.
// 2. The streaming Color Sensor handles the
//    SNS_STD_SENSOR_MSGID_SNS_STD_SENSOR_CONFIG request
//    for all stream enable/update requests.
// 3. The on-change Color Sensor handles the
//    SNS_STD_SENSOR_MSGID_SNS_STD_ON_CHANGE_CONFIG request for
//    all stream enable/update requests.
// 4. In on-change mode the Sensor uses interrupt operation and reports
//    samples for only significant change in Color.
//    Example: +/- 10% change.
//
// ## Publishing stream events:
// 1. The Color Sensor publishes current illumination data stream
//    events using the sns_std_sensor_event message.
// 2. Each stream event contains at least 7 output data fields.
//    The data is factory calibrated and ordered as:
//    @code
//    data[0] = The illuminance level (in lux)
//    data[1] = The light temperature (in Kelvins)
//    data[2] = The x color coordinate on the CIE 1931 chromaticity diagram
//    data[3] = The y color coordinate on the CIE 1931 chromaticity diagram
//    data[4] = Tristimulus X
//    data[5] = Tristimulus Y
//    data[6] = Tristimulus Z
//    @endcode
//    Additional data fields may be defined in a device-specific API file.
// 3. Each stream event publishes an accuracy field:
//    SNS_STD_SENSOR_SAMPLE_STATUS_UNRELIABLE to mark invalid samples when 
//    hardware is yet to stabilize after the sensor is configured or the lux 
//    value is invalid. SNS_STD_SENSOR_SAMPLE_STATUS_ACCURACY_HIGH to mark 
//    samples when lux value is valid.
// 4. The Color Sensor publishes a configuration event using the
//    sns_std_sensor_physical_config_event message.
//    It publishes this event each time there is change in hardware config of 
//   the sensor or when a client sends a new request.
// 5. The Color Sensor may publish a factory calibration event using the
//    sns_cal_event message.
//    If supported, it shall publish this event each time there is change in its
//    factory calibration data or when a client sends a new request.
//
// ## Processing self-test requests:
// 1. The Color Sensor implements SNS_PHYSICAL_SENSOR_TEST_TYPE_COM test
//    type using the physical sensor test API.
// 2. The Color Sensor implements SNS_PHYSICAL_SENSOR_TEST_TYPE_FACTORY test
//    type to determine factory calibration parameters using the physical
//    sensor test API. The factory test for Color Sensor calibrates
//    the sensor such that its output Lux value is comparable to a standard
//    Chroma meter output in any lighting condition.
// 3. The Color Sensor may implement other test types.
//
// ## Publishing self-test events:
// 1. The Color Sensor uses sns_physical_sensor_test_event message to publish
//    a test completion event.
// 2. The test_passed field in sns_physical_sensor_test_event is used to output 
//    the pass/fail result of self-test execution.
// 3. The test_data field in sns_physical_sensor_test_event may be used to 
//    output any driver-specific error data.

syntax = "proto2";
import "nanopb.proto";
import "sns_std_sensor.proto";
import "sns_physical_sensor_test.proto";
import "sns_cal.proto";
