// Confidential and Proprietary - Qualcomm Technologies, Inc.
//
// @details Detect Elevator Entry and Elevator Exit state
//
// ## Attribute Requirements:
// 1. SNS_STD_SENSOR_ATTRID_TYPE: "elevator_detection".
// 2. SNS_STD_SENSOR_ATTRID_STREAM_TYPE: SNS_STD_SENSOR_STREAM_TYPE_ON_CHANGE.
// 3. SNS_STD_SENSOR_ATTRID_API: "sns_elevation_detection.proto".
//
// ## Processing Stream Requests:
// - SNS_STD_SENSOR_MSGID_SNS_STD_ON_CHANGE_CONFIG is used to enable the sensor.
//
// ## Publishing Stream Events:
// - SNS_ELEVATOR_DETECTION_MSGID_SNS_ED_EVENT: A new event will be generated upon
//   state change.

syntax = "proto2";
import "nanopb.proto";
import "sns_std_sensor.proto";

// @brief Message IDs for Elevator Detection Sensor
enum sns_elevator_detection_msgid {
  option (nanopb_enumopt).long_names = false;

  // The sns_ed_event message is used to publish updated state.  A new event
  // will be generated upon any state change.
  SNS_ELEVATOR_DETECTION_MSGID_SNS_ED_EVENT = 802;
}

// @brief Elevator detection states
enum sns_ed_state
{
  option (nanopb_enumopt).long_names = false;

  SNS_ED_UNKNOWN = 0;
  // Elevator entry is detected
  SNS_ED_ENTRY = 1;
  // Elevator exit is detected
  SNS_ED_EXIT = 2;
}

// @brief Elevator detection event message
message sns_ed_event
{
  // elevator state
  required sns_ed_state state = 1 ;
}
