//
// @details 
// Significant Motion detector detects significant motion and stationary states
//
// ## Attribute Requirements:
// 1. SNS_STD_SENSOR_ATTRID_TYPE: "smd_tracker"
// 2. SNS_STD_SENSOR_ATTRID_STREAM_TYPE: SNS_STD_SENSOR_STREAM_TYPE_ON_CHANGE
// 3. SNS_STD_SENSOR_ATTRID_API: "sns_smd_tracker.proto"
//
// ## Processing Stream Requests:
// - SNS_STD_SENSOR_MSGID_SNS_STD_ON_CHANGE_CONFIG is used to enable the sensor
//
// ## Publishing Stream Events:
// Stream events are imported from sns_amd.proto.
// smd_tracker Sensor reports SNS_AMD_MSGID_SNS_AMD_EVENT with event types:
// SNS_AMD_EVENT_TYPE_UNKNOWN: algorithm returns an unexpected state
// SNS_AMD_EVENT_TYPE_STATIONARY: device is in stationary state(< 5 mph)
// SNS_AMD_EVENT_TYPE_MOTION: device is in motion state(>= 5 mph)

syntax = "proto2";
import "nanopb.proto";
import "sns_std_sensor.proto";
import "sns_amd.proto";