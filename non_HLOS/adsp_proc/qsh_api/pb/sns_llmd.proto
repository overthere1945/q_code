//
// @details 
// Low Latency Motion Detector calculates motion and stationary states.
// LLMD will not report an unknown state, and report either motion or 
// stationary after sufficient data samples are received.
//
// ## Attribute Requirements:
// 1. SNS_STD_SENSOR_ATTRID_TYPE: "llmd"
// 2. SNS_STD_SENSOR_ATTRID_STREAM_TYPE: SNS_STD_SENSOR_STREAM_TYPE_ON_CHANGE
// 3. SNS_STD_SENSOR_ATTRID_API: "sns_llmd.proto"
//
// ## Processing Stream Requests:
// - SNS_STD_SENSOR_MSGID_SNS_STD_ON_CHANGE_CONFIG is used to enable the sensor
//
// ## Publishing Stream Events:
// - Stream events are imported from sns_amd.proto


syntax = "proto2";
import "nanopb.proto";
import "sns_std_sensor.proto";
import "sns_amd.proto";
