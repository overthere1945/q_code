// @file sns_oem1.proto
//
// @brief Defines the API for the for the OEM1 Sensor.
//
// @copyright
// Copyright (c) 2017-2018, 2024 Qualcomm Technologies, Inc.
// All Rights Reserved.
// Confidential and Proprietary - Qualcomm Technologies, Inc.
//
// @details The oem1 sensor is a reference sensor for clients to develop virtual
//          sensors.
//
// ## Attribute Requirements:
// 1. SNS_STD_SENSOR_ATTRID_TYPE: "oem1".
// 2. SNS_STD_SENSOR_ATTRID_STREAM_TYPE: SNS_STD_SENSOR_STREAM_TYPE_ON_CHANGE.
// 3. SNS_STD_SENSOR_ATTRID_API: "sns_oem1.proto".
//
// ## Processing Stream Requests:
// - SNS_STD_SENSOR_MSGID_SNS_STD_ON_CHANGE_CONFIG is used to enable the sensor.
//
// ## Publishing Stream Events:
// - SNS_OEM1_MSGID_SNS_OEM1_DATA: The data event is generated when Accel z data
//   value is changed from positive to negative or vice versa.

syntax = "proto2";
import "nanopb.proto";
import "sns_std_sensor.proto";

// @brief Message IDs for oem1 Sensor
enum sns_oem1_msgid
{
  option (nanopb_enumopt).long_names = false;

  SNS_OEM1_MSGID_SNS_OEM1_DATA = 1024;
}

// @brief Output data event generated by the oem1 sensor.
message sns_oem1_data
{
  // @brief oem1 Vector along axis x,y,z in m/s2.
  repeated float oem1 = 1 [(nanopb).max_count = 3];

  // @brief Accuracy of the data.
  required sns_std_sensor_sample_status accuracy = 2;
}
