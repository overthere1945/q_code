// @file sns_ai_oem1.proto
//
// @brief Defines the API for the AI_OEM1 Sensor.
//
// @copyright
// Copyright (c) Qualcomm Technologies, Inc. and/or its subsidiaries.
// All Rights Reserved.
// Confidential and Proprietary - Qualcomm Technologies, Inc.
//
// @details The ai_oem1 sensor is a reference sensor for clients 
//          to develop virtual ML-based sensors. Determines the
//          orientation of user's device.
//
// ## Attribute Requirements:
// 1. SNS_STD_SENSOR_ATTRID_TYPE: "ai_oem1".
// 2. SNS_STD_SENSOR_ATTRID_STREAM_TYPE: SNS_STD_SENSOR_STREAM_TYPE_ON_CHANGE.
// 3. SNS_STD_SENSOR_ATTRID_API: "sns_ai_oem1.proto".
//
// ## Processing Stream Requests:
// - SNS_STD_SENSOR_MSGID_SNS_STD_ON_CHANGE_CONFIG is used to enable the sensor.
//
// ## Publishing Stream Events:
// - SNS_AI_OEM1_MSGID_SNS_AI_OEM1_EVENT: The data event is generated when a change in 
//   device orientation is detected - i.e. when the device's orientation changes from 
//   upward facing to downward facing or vice versa

syntax = "proto2";
import "nanopb.proto";
import "sns_std_sensor.proto";

// @brief Message IDs for AI_OEM1 Sensor
enum sns_ai_oem1_msgid
{
  option (nanopb_enumopt).long_names = false;
  
  SNS_AI_OEM1_MSGID_SNS_AI_OEM1_EVENT = 1024;
}

// @brief Orientation States generated by AI_OEM1 sensor
enum sns_ai_oem1_event_type
{
  option (nanopb_enumopt).long_names = false;

  SNS_AI_OEM1_EVENT_TYPE_ORIENTATION_UNKNOWN  = 0;
  SNS_AI_OEM1_EVENT_TYPE_ORIENTATION_UP       = 1;
  SNS_AI_OEM1_EVENT_TYPE_ORIENTATION_DOWN     = 2;
}

// @brief Event generated by AI_OEM1 to convey user's current
//        device orientation state.
message sns_ai_oem1_event
{

  // @brief Device Orientation State 
  required sns_ai_oem1_event_type orientation = 1 [default = SNS_AI_OEM1_EVENT_TYPE_ORIENTATION_UNKNOWN]; 

}
