// @file sns_aont.proto
//
// @brief Defines the API for the AONT(Always On Test) Sensor.
//
// @copyright
// Copyright (c) Qualcomm Technologies, Inc. and/or its subsidiaries.
// All Rights Reserved.
// Confidential and Proprietary - Qualcomm Technologies, Inc.
//
// @details The Always On Test Sensor runs an always on sensors usecase
//          for stability test coverage.
//
// ## Attribute Requirements:
// 1. SNS_STD_SENSOR_ATTRID_TYPE: "always_on_test".
// 2. SNS_STD_SENSOR_ATTRID_STREAM_TYPE: SNS_STD_SENSOR_STREAM_ON_CHANGE.
// 3. SNS_STD_SENSOR_ATTRID_API: "sns_aont.proto".
//
// ## Processing Stream Requests:
// - SNS_STD_SENSOR_MSGID_SNS_STD_ON_CHANGE_CONFIG is used to enable the sensor.
//
// ## Publishing Stream Events:
// - SNS_AONT_MSGID_SNS_AONT_DATA event is generated by the Always on test sensor.

syntax = "proto2";
import "nanopb.proto";
import "sns_std_sensor.proto";

// @brief Message IDs for Always On Test Sensor
enum sns_aont_msgid
{
  option (nanopb_enumopt).long_names = false;

  SNS_AONT_MSGID_SNS_AONT_DATA = 1024;
}

// @brief Output data event generated by the aont sensor.
message sns_aont_data
{
  // @brief AONT output - Accel data along axis x,y,z in m/s2
  repeated float aont = 1 [(nanopb).max_count = 3];
}
