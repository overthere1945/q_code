// @file sns_accel_cal.proto
//
// @brief Defines message types for the Accel Calibration Sensors.
//
// @copyright
// Copyright (c) Qualcomm Technologies, Inc. and/or its subsidiaries.
// All rights reserved.
// Confidential and Proprietary - Qualcomm Technologies, Inc.
//
// @details The Accel Calibration Sensor determines
// the calibration parameters for accel sensor.
//
// ## Attributes Requirements:
// 1. SNS_STD_SENSOR_ATTRID_TYPE: "accel_cal"
// 2. SNS_STD_SENSOR_ATTRID_STREAM_TYPE: SNS_STD_SENSOR_STREAM_TYPE_ON_CHANGE
// 3. SNS_STD_SENSOR_ATTRID_API attribute contains "sns_accel_cal.proto"
// 4. SNS_STD_SENSOR_ATTRID_RIGID_BODY: sns_std_sensor_rigid_body_type
//      - The rigid body of accel whose cal is being measured
//
// ## Processing Stream Requests:
// - SNS_STD_SENSOR_MSGID_SNS_STD_ON_CHANGE_CONFIG message ID is used to
//      enable the sensor
// - SNS_CAL_MSGID_SNS_CAL_RESET message ID is used to reset the algorithm
//      and any previously determined calibration parameters.
//
// ## Publishing Stream Events:
// - SNS_CAL_MSGID_SNS_CAL_EVENT message ID is used to report calibration
//      parameters to the client of the sensor. The sns_cal_event message as
//      defined in sns_cal.proto is used to report this data event where the
//      units for the bias field in the message are in m / s ^2

syntax = "proto2";
import "nanopb.proto";
import "sns_cal.proto";

